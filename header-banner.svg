<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&amp;family=Space+Grotesk:wght@300;700&amp;display=swap');
    </style>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="60%" stop-color="#000000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="sideFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="#000000"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="40" x2="900" y2="40" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="0" y1="80" x2="900" y2="80" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="0" y1="160" x2="900" y2="160" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="0" y1="200" x2="900" y2="200" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="0" y1="240" x2="900" y2="240" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>

  <!-- Grid lines vertical -->
  <line x1="60"  y1="0" x2="60"  y2="280" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="120" y1="0" x2="120" y2="280" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="180" y1="0" x2="180" y2="280" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="240" y1="0" x2="240" y2="280" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="300" y1="0" x2="300" y2="280" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="360" y1="0" x2="360" y2="280" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="420" y1="0" x2="420" y2="280" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="480" y1="0" x2="480" y2="280" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="540" y1="0" x2="540" y2="280" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="280" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="660" y1="0" x2="660" y2="280" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="720" y1="0" x2="720" y2="280" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="780" y1="0" x2="780" y2="280" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="840" y1="0" x2="840" y2="280" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>

  <!-- Matrix rain characters (static, layered opacity) -->
  <!-- Column 1 -->
  <text x="12"  y="18"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.06">ア</text>
  <text x="12"  y="34"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.10">01</text>
  <text x="12"  y="50"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.14">ウ</text>
  <text x="12"  y="66"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.09">カ</text>
  <text x="12"  y="82"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.05">10</text>
  <!-- Column 2 -->
  <text x="32"  y="28"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.08">サ</text>
  <text x="32"  y="44"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.13">ス</text>
  <text x="32"  y="60"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.07">01</text>
  <!-- Column 3 -->
  <text x="52"  y="14"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.11">タ</text>
  <text x="52"  y="30"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.16">チ</text>
  <text x="52"  y="46"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.12">00</text>
  <text x="52"  y="62"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.07">ナ</text>
  <!-- Scattered mid-field characters -->
  <text x="200" y="22"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.05">ハ</text>
  <text x="220" y="38"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.07">01</text>
  <text x="240" y="18"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.04">ヒ</text>
  <text x="260" y="44"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.06">10</text>
  <text x="700" y="20"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.09">マ</text>
  <text x="720" y="36"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.12">ミ</text>
  <text x="740" y="18"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.07">01</text>
  <text x="760" y="48"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.05">ム</text>
  <text x="800" y="26"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.10">ラ</text>
  <text x="820" y="14"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.14">リ</text>
  <text x="840" y="42"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.08">00</text>
  <text x="860" y="22"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.11">ル</text>
  <text x="880" y="54"  font-family="JetBrains Mono" font-size="11" fill="#ffffff" fill-opacity="0.06">ワ</text>

  <!-- Fade overlays -->
  <rect width="900" height="280" fill="url(#fade)"/>
  <rect width="900" height="280" fill="url(#sideFade)"/>

  <!-- Horizontal rule -->
  <line x1="48" y1="198" x2="852" y2="198" stroke="#222222" stroke-width="0.5"/>

  <!-- Name — large editorial -->
  <text x="48" y="176" font-family="'Space Grotesk', 'JetBrains Mono', monospace" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">NEERAJ SAINI</text>

  <!-- Role line -->
  <text x="50" y="218" font-family="'JetBrains Mono', monospace" font-size="11" fill="#444444" letter-spacing="3">SOLO FOUNDER &amp; SYSTEM ARCHITECT &nbsp;·&nbsp; 19 Y/O &nbsp;·&nbsp; BENGALURU</text>

  <!-- Bottom meta row -->
  <text x="50"  y="252" font-family="'JetBrains Mono', monospace" font-size="10" fill="#333333" letter-spacing="1.5">collabkaro.in</text>
  <text x="160" y="252" font-family="'JetBrains Mono', monospace" font-size="10" fill="#222222" letter-spacing="1.5">·</text>
  <text x="174" y="252" font-family="'JetBrains Mono', monospace" font-size="10" fill="#333333" letter-spacing="1.5">IIT Jodhpur</text>
  <text x="266" y="252" font-family="'JetBrains Mono', monospace" font-size="10" fill="#222222" letter-spacing="1.5">·</text>
  <text x="280" y="252" font-family="'JetBrains Mono', monospace" font-size="10" fill="#333333" letter-spacing="1.5">PW IOI</text>
  <text x="340" y="252" font-family="'JetBrains Mono', monospace" font-size="10" fill="#222222" letter-spacing="1.5">·</text>
  <text x="354" y="252" font-family="'JetBrains Mono', monospace" font-size="10" fill="#333333" letter-spacing="1.5">github.com/62fpsgaming-hue</text>

  <!-- Status pill top-right -->
  <rect x="788" y="242" width="64" height="18" fill="none" stroke="#222222" stroke-width="0.5"/>
  <text x="820" y="255" font-family="'JetBrains Mono', monospace" font-size="9" fill="#444444" letter-spacing="2" text-anchor="middle">SHIPPING</text>
</svg>
